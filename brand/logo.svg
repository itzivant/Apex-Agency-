<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <style>
      .wordmark { font-family: 'Inter', 'DM Sans', 'Arial', sans-serif; font-weight: 700; letter-spacing: 0.12em; }
      .tagline  { font-family: 'Inter', 'DM Sans', 'Arial', sans-serif; font-weight: 400; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- === DARK VARIANT (navy badge + electric blue mark + white text) === -->
  <g id="logo-dark">
    <!-- Badge background -->
    <rect width="320" height="80" rx="8" fill="#0A1628"/>

    <!-- AM Monogram mark — geometric upward-arrow construction -->
    <!-- The A: left diagonal, right diagonal (shared with M's left leg), crossbar -->
    <!-- The M: shares A's right leg as left leg, center dip, right leg -->

    <!-- A left stroke -->
    <line x1="18" y1="62" x2="36" y2="14" stroke="#2563EB" stroke-width="5" stroke-linecap="square"/>
    <!-- A right stroke / M left stroke (shared) -->
    <line x1="54" y1="62" x2="36" y2="14" stroke="#2563EB" stroke-width="5" stroke-linecap="square"/>
    <!-- A crossbar -->
    <line x1="24" y1="44" x2="48" y2="44" stroke="#2563EB" stroke-width="3.5" stroke-linecap="square"/>
    <!-- M center-dip (from A's right leg peak, down to midpoint, back up) -->
    <polyline points="54,62 64,38 74,62" stroke="#2563EB" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
    <!-- M right leg -->
    <line x1="74" y1="62" x2="74" y2="62" stroke="#2563EB" stroke-width="5" stroke-linecap="square"/>

    <!-- Divider line -->
    <line x1="92" y1="16" x2="92" y2="64" stroke="#1E3A5F" stroke-width="1.5"/>

    <!-- Wordmark -->
    <text x="106" y="37" class="wordmark" font-size="18" fill="#FFFFFF">APEX</text>
    <text x="106" y="58" class="tagline" font-size="11" fill="#2563EB">MARKETING AGENCY</text>
  </g>
</svg>
